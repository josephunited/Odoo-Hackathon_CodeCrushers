# Server configuration
server.port=8080

# Profile selection (default to dev using H2, can override with -Dspring.profiles.active=mysql)
spring.profiles.active=dev

# H2 console configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Developer profile (H2 In-Memory)
%dev.spring.datasource.url=jdbc:h2:mem:assetdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
%dev.spring.datasource.driverClassName=org.h2.Driver
%dev.spring.datasource.username=sa
%dev.spring.datasource.password=
%dev.spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
%dev.spring.jpa.hibernate.ddl-auto=update
%dev.spring.jpa.show-sql=true

# MySQL Profile (Can be activated via command-line or environment)
%mysql.spring.datasource.url=jdbc:mysql://localhost:3306/assetflow?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
%mysql.spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
%mysql.spring.datasource.username=root
%mysql.spring.datasource.password=root
%mysql.spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
%mysql.spring.jpa.hibernate.ddl-auto=update
%mysql.spring.jpa.show-sql=true

# Upload files max size configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
